<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colour Trading</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
color:white;
text-align:center;
overflow-x:hidden;
}

/* TITLE */

header{

.hero{

font-weight:bold;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:25px;
padding:15px 40px;
border-radius:30px;
background:white;
color:black;
font-size:18px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.btn:hover{
background:gold;
}

/* TELEGRAM */

.telegram{
display:inline-block;
margin-top:15px;
padding:14px 35px;
border-radius:30px;
background:#0088cc;
color:white;
font-size:18px;
text-decoration:none;
font-weight:bold;
}

/* FEATURES */

.features{
margin-top:70px;
padding:40px 20px;
background:#111;
}

.features h2{
margin-bottom:25px;
}

.feature{
background:#000;
border:1px solid #333;
margin:10px auto;
padding:15px;
border-radius:8px;
width:250px;
}

/* WIN POPUP */

.popup{
position:fixed;
bottom:25px;
left:20px;
padding:14px 20px;
border-radius:10px;
font-size:15px;
color:white;
font-weight:bold;
background:linear-gradient(45deg,#ff3b3b,#ff9800,#00e676,#2196f3,#e040fb);
background-size:400% 400%;
animation:winGradient 6s ease infinite, pulseWin 1.5s infinite;
box-shadow:0 0 15px rgba(255,255,255,0.3);
}

@keyframes winGradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes pulseWin{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

/* COIN ANIMATION */

.coin{
position:fixed;
top:-50px;
font-size:22px;
animation:coinFall 4s linear forwards;
}

@keyframes coinFall{
0%{
transform:translateY(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(700px) rotate(720deg);
opacity:0;
}
}

/* FOOTER */

footer{
margin-top:60px;
padding:20px;
color:#aaa;
}
